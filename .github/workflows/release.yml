name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Fetch main branch
        run: git fetch origin main --depth=1

      - name: Verify tag commit is on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Tag commit $GITHUB_SHA is not reachable from origin/main." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate package
        run: npm run validate

      - name: Verify publish payload
        run: npm run release:check

      - name: Verify tag matches package version
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version $tag_version does not match package version $package_version." >&2
            exit 1
          fi

      - name: Create GitHub release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "GitHub release $GITHUB_REF_NAME already exists."
          else
            gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
